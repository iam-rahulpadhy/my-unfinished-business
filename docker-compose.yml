services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mub_db
      POSTGRES_USER: mub_user
      POSTGRES_PASSWORD: mub_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mub_user -d mub_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mub_network

  # ─── pgAdmin (optional, for DB inspection) ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mub_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mub.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mub_network

  # ─── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mub_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mub_db
      DB_USER: mub_user
      DB_PASSWORD: mub_secret
      JWT_SECRET: "CHANGE_THIS_TO_A_STRONG_512BIT_SECRET_BEFORE_PRODUCTION"
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mub_network

  # ─── React / Vite Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mub_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - mub_network

volumes:
  postgres_data:

networks:
  mub_network:
    driver: bridge
