spring:
  application:
    name: my-unfinished-business

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mub_db}
    username: ${SPRING_DATASOURCE_USERNAME:mub_user}
    password: ${SPRING_DATASOURCE_PASSWORD:mub_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: rahulpadhy58@gmail.com
    password: bpfd uvnm boie vjlp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}  # Natively binds to Render's port variable, defaults to 8080 locally

# ─── JWT Configuration ────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_THIS_TO_A_STRONG_512BIT_SECRET_BEFORE_PRODUCTION}
    expiration-ms: 86400000   # 24 hours

  # ─── Master Reset Key ─────────────────────────────────────────────────────
  reset-key: ${RESET_KEY:CHANGE_THIS_TO_YOUR_SECRET_RESET_PHRASE}

# ─── CORS ─────────────────────────────────────────────────────────────────────
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}